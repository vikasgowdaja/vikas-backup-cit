<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/student-app.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>
<body>
<div class="bg-shape bg-one"></div>
<div class="bg-shape bg-two"></div>
<main class="detail-shell">
    <section class="card-detail">
        <p class="tagline">ID Card Render</p>
        <h1>Student ID Card</h1>

        <article id="id-card-canvas" class="id-card-surface" data-student-code="" th:attr="data-student-code=${card.studentCode}">
            <div class="id-brand-strip"></div>
            <header class="id-card-header">
                <img class="id-logo" th:src="${collegeLogoPath}" alt="College logo" onerror="this.src='/assets/cit-placeholder.svg'">
                <div>
                    <h2>Coorg Institute of Technology</h2>
                    <p>Official Student Identity Card</p>
                </div>
            </header>

            <section class="id-card-body">
                <img class="student-face" th:src="${studentPhotoPath}" alt="Student photo">
                <div class="id-meta">
                    <h3 th:text="${card.studentName}">Student Name</h3>
                    <p class="id-code" th:text="${card.studentCode}">CSE-2026-001</p>
                    <div class="mini-grid">
                        <p><span>Department</span><strong th:text="${card.department}"></strong></p>
                        <p><span>Blood Group</span><strong th:text="${card.bloodGroup}"></strong></p>
                        <p><span>Email</span><strong th:text="${card.email}"></strong></p>
                        <p><span>Phone</span><strong th:text="${card.phoneNumber}"></strong></p>
                        <p><span>Issued On</span><strong th:text="${card.issuedOn}"></strong></p>
                        <p><span>Valid Till</span><strong th:text="${card.validTill}"></strong></p>
                    </div>
                </div>
            </section>

            <footer class="id-card-footer">
                <p>Authorized Campus Identification</p>
                <p class="sign-line">Registrar Signature</p>
            </footer>
        </article>

        <div class="form-actions">
            <button class="btn btn-primary" type="button" id="download-card-btn">Download ID Card Image</button>
        </div>

        <div class="form-actions">
            <a class="btn btn-ghost" th:href="@{/students}">Back</a>
            <a class="btn btn-primary" th:href="@{'/students/' + ${card.id} + '/edit'}">Edit</a>
        </div>
    </section>
</main>
<script th:src="@{/js/student-app.js}"></script>
</body>
</html>
